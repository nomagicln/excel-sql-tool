name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        include:
          - goos: windows
            artifact: excel-sql-tool.exe
          - goos: linux
            artifact: excel-sql-tool
          - goos: darwin
            artifact: excel-sql-tool

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          output="excel-sql-tool-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w" -o "$output" ./cmd/cli/
          echo "artifact=$output" >> $GITHUB_OUTPUT
          echo "ext=$ext" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: excel-sql-tool-*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=${GITHUB_REF#refs/tags/}
          version=${tag#v}

          gh release create "$tag" \
            --title "v$version" \
            --generate-notes

          # Upload all artifacts
          find artifacts/ -type f | while read f; do
            gh release upload "$tag" "$f" --clobber
          done
